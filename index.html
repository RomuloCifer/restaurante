<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catheons — Restaurante</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Karla:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- visual effects overlay (added for deity transitions) -->
    <div id="effects" class="effects" aria-hidden="true"></div>
    <!-- left decorative area removed (no paw image) -->

    <main class="content">
      <header class="hero">
        <h1>Catheons — Onde Gatos encontram Deuses</h1>
        <p class="subtitle">Uma experiência gastronômica mitológica com alma felina.</p>
      </header>

      <section class="panel">
        <aside class="menu" id="menu">
          <!-- menu content injected by JS -->
        </aside>

        <section class="story" id="story">
          <!-- story content injected by JS -->
        </section>
      </section>

      <footer class="actions">
        <button class="btn primary">Fazer Reserva</button>
        <button class="btn">Ver História</button>
        <button class="btn">Localização</button>
      </footer>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
